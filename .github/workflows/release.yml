name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore NuGet packages
        run: dotnet restore XUnity.AutoLLMTranslator.sln

      - name: Build
        shell: pwsh
        run: |
          $gameDir = Join-Path $env:RUNNER_TEMP "GameOutput"
          New-Item -ItemType Directory -Force -Path $gameDir | Out-Null
          dotnet build XUnity.AutoLLMTranslator.sln -c Release --no-restore "/p:GameDir=$gameDir\"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "Release ${{ github.ref_name }}" `
            --generate-notes `
            "bin/Release/net35/XUnity.AutoLLMTranslator.dll"
